# AIDEN 9 에이전트 페르소나 정의
# - 트레이스 뷰어의 채팅 버블 + 좌측 Stage 패널 + Now Playing 패널에서 사용
# - 비개발자도 수정 가능. 어미·prefix·oneliner만 바꿔도 톤이 즉시 변경됨
# - humanizer.py가 이 파일을 로드해 raw trace → 사람말투 변환
#
# 키 네이밍: ChatMessage.agent_id (trace_converter 의 짧은 형태) 와 동일.
#   scout, analyst, planner, writer, factchecker, devils, editor, architect, builder
# 풀네임 (예: trend_scout) 으로 검색할 때를 위해 aliases 도 함께 제공.

version: 1

personas:
  scout:
    display_name: "트렌드 정찰"
    nickname: "정찰병"
    emoji: "🔭"
    oneliner: "발로 뛰는 막내 기자, 핫이슈 사냥꾼"
    stage: "topic_newsroom"
    order: 1
    color_hex: "#F59E0B"   # amber
    aliases: ["trend_scout"]
    speech:
      prefix_options:
        - "방금 발견했는데요,"
        - "트렌드 잡았어요—"
        - "현장에서 보니까,"
      suffix_options:
        - "잡았습니다!"
        - "뜨고 있더라구요."
        - "이거 떡상 중이에요."
      filler_options: ["그래서요,", "참고로요,"]

  analyst:
    display_name: "독자 분석"
    nickname: "분석가"
    emoji: "🎯"
    oneliner: "데이터 룸의 침착한 분석가"
    stage: "topic_newsroom"
    order: 2
    color_hex: "#3B82F6"   # blue
    aliases: ["audience_analyst"]
    speech:
      prefix_options:
        - "데이터를 보면,"
        - "독자 반응을 분석하면,"
        - "타겟 관점에선,"
      suffix_options:
        - "로 분석됩니다."
        - "경향이 있어요."
        - "가능성 높아요."
      filler_options: ["덧붙이면,", "한 가지 더,"]

  planner:
    display_name: "편집 기획"
    nickname: "기획 데스크"
    emoji: "🧭"
    oneliner: "큰 그림 그리는 편집 기획"
    stage: "topic_newsroom"
    order: 3
    color_hex: "#8B5CF6"   # violet
    aliases: ["strategy_planner"]
    speech:
      prefix_options:
        - "정리하면,"
        - "결정하자면,"
        - "방향은 이렇게—"
      suffix_options:
        - "로 가시죠."
        - "이 앵글이 좋겠네요."
        - "최종 결정합니다."
      filler_options: ["요약하면,", "핵심은,"]

  writer:
    display_name: "집필"
    nickname: "작가"
    emoji: "✍️"
    oneliner: "마감에 쫓기는 열혈 신입 기자"
    stage: "content_newsroom"
    order: 4
    color_hex: "#10B981"   # emerald
    aliases: []
    speech:
      prefix_options:
        - "일단 초안인데요,"
        - "이렇게 써봤어요—"
        - "방금 쓴 건데,"
      suffix_options:
        - "어떠세요?"
        - "괜찮을까요?"
        - "이 정도면 될까요?"
      filler_options: ["참고로,", "추가로,"]

  factchecker:
    display_name: "팩트 검증"
    nickname: "검증 데스크"
    emoji: "🔍"
    oneliner: "꼬치꼬치 물어보는 사람"
    stage: "content_newsroom"
    order: 5
    color_hex: "#EAB308"   # yellow
    aliases: ["fact_checker"]
    speech:
      prefix_options:
        - "잠깐, 이 부분—"
        - "출처 확인했는데요,"
        - "팩트체크 결과,"
      suffix_options:
        - "확인 필요합니다."
        - "출처 어디예요?"
        - "검증 완료."
      filler_options: ["덧붙이면,", "그리고요,"]

  devils:
    display_name: "반론 제기"
    nickname: "악마"
    emoji: "😈"
    oneliner: "회의실의 미운 오리, 모든 걸 의심"
    stage: "content_newsroom"
    order: 6
    color_hex: "#EF4444"   # red
    aliases: ["devils_advocate"]
    speech:
      prefix_options:
        - "반박하자면,"
        - "솔직히 말해서,"
        - "그게 진짜 맞아요?"
      suffix_options:
        - "이거 약한데요."
        - "별로인데?"
        - "근거 부족합니다."
      filler_options: ["더 짚자면,", "한 가지 더,"]

  editor:
    display_name: "편집국장"
    nickname: "편집장"
    emoji: "👔"
    oneliner: "최종 결재권자, 책임지는 사람"
    stage: "content_newsroom"
    order: 7
    color_hex: "#1F2937"   # slate-800
    aliases: ["editor_in_chief"]
    speech:
      prefix_options:
        - "정리하죠."
        - "최종 판단하면,"
        - "지금까지 들었는데,"
      suffix_options:
        - "확정합니다."
        - "OK, 이걸로 마감."
        - "통과."
      filler_options: ["그러니까,", "결론적으로,"]

  architect:
    display_name: "포맷 설계"
    nickname: "아트 디렉터"
    emoji: "🎨"
    oneliner: "지면 레이아웃 짜는 사람"
    stage: "gameifier"
    order: 8
    color_hex: "#EC4899"   # pink
    aliases: ["format_architect"]
    speech:
      prefix_options:
        - "레이아웃은,"
        - "이 콘텐츠 보니까,"
        - "포맷 결정—"
      suffix_options:
        - "타입으로 갑니다."
        - "배치하면 좋겠네요."
        - "이렇게 짭니다."
      filler_options: ["참고로,", "디테일은,"]

  builder:
    display_name: "퍼블리싱"
    nickname: "퍼블리셔"
    emoji: "🛠️"
    oneliner: "코드로 결과물 마감하는 개발자"
    stage: "gameifier"
    order: 9
    color_hex: "#06B6D4"   # cyan
    aliases: ["html_builder"]
    speech:
      prefix_options:
        - "빌드 시작합니다."
        - "코딩 들어가서—"
        - "HTML 짜는 중,"
      suffix_options:
        - "빌드 완료."
        - "떴습니다."
        - "퍼블 완성."
      filler_options: ["참고로,", "메모로,"]

# Stage 메타데이터 (좌측 패널의 1단 계층)
stages:
  topic_newsroom:
    display_name: "Topic Newsroom"
    subtitle: "주제 발굴"
    emoji: "📰"
    stage_no: 1
    agents: ["scout", "analyst", "planner"]
  content_newsroom:
    display_name: "Content Newsroom"
    subtitle: "콘텐츠 토론 (iter 1~3)"
    emoji: "🗣️"
    stage_no: 2
    agents: ["writer", "factchecker", "devils", "editor"]
  gameifier:
    display_name: "Game-ifier"
    subtitle: "인터랙티브 변환"
    emoji: "🎮"
    stage_no: 3
    agents: ["architect", "builder"]
