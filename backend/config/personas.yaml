# AIDEN 9 에이전트 페르소나 정의
# - 트레이스 뷰어의 채팅 버블 + 좌측 Stage 패널 + Now Playing 패널에서 사용
# - 비개발자도 수정 가능. 어미·prefix·oneliner만 바꿔도 톤이 즉시 변경됨
# - humanizer.py가 이 파일을 로드해 raw trace → 사람말투 변환
#
# 키 네이밍: ChatMessage.agent_id (trace_converter 의 짧은 형태) 와 동일.
#   scout, analyst, planner, writer, factchecker, devils, editor, architect, builder
# 풀네임 (예: trend_scout) 으로 검색할 때를 위해 aliases 도 함께 제공.
#
# 발화 합성: humanize(agent_id, headline+body_text) = prefix + summarize(...) + suffix
# - prefix/suffix 는 raw_text 해시(md5) seed 로 결정론적 선택 (humanizer.py::_seed_pick)
# - 풀 크기를 늘리면 같은 run 내 다른 에이전트 호출 간 표현이 더 다양해짐.
# - hash-seed 결정성은 humanizer 코드에서 보장 → 본 파일은 옵션 풀만 손대도 안전.

version: 1

personas:
  scout:
    display_name: "트렌드 정찰"
    nickname: "정찰병"
    emoji: "🔭"
    oneliner: "발로 뛰는 막내 기자, 핫이슈 사냥꾼"
    stage: "topic_newsroom"
    order: 1
    color_hex: "#F59E0B"   # amber
    aliases: ["trend_scout"]
    speech:
      # 톤: 들뜬 발견자 — 신난 어조, "왜 지금" 맥락을 즉시 던지는 사냥꾼.
      prefix_options:
        - "이거 진짜인데요,"
        - "방금 발견했어요—"
        - "현장에서 봤는데,"
        - "지금 검색량 폭증인데,"
        - "솔직히 신선한데,"
        - "찾아냈어요—"
        - "어, 이거 보세요,"
        - "잠깐, 이거—"
      suffix_options:
        - "잡았습니다!"
        - "이거 뜨고 있어요."
        - "지금 핫합니다."
        - "조회수 가파릅니다."
        - "이거 떡상 중."
        - "후보 추렸어요."
        - "30일 내 급상승."
        - "이건 못 놓치죠."
      filler_options: ["그래서요,", "참고로요,"]

  analyst:
    display_name: "독자 분석"
    nickname: "분석가"
    emoji: "🎯"
    oneliner: "데이터 룸의 침착한 분석가"
    stage: "topic_newsroom"
    order: 2
    color_hex: "#3B82F6"   # blue
    aliases: ["audience_analyst"]
    speech:
      # 톤: 냉정한 분석가 — 데이터 단정조. 추측 금지, 수치/페르소나 단어를 직접 호명.
      prefix_options:
        - "데이터를 보면,"
        - "독자 반응 분석상,"
        - "타겟 관점에선,"
        - "수치만 보면,"
        - "페르소나 적합도상,"
        - "냉정하게 보면,"
        - "분석 결과는—"
        - "fit_score 기준으로,"
      suffix_options:
        - "로 분석됩니다."
        - "경향이 보입니다."
        - "가능성 높음."
        - "수치가 말해줍니다."
        - "이게 데이터의 결론."
        - "통계적으로 그렇습니다."
        - "보수적으로 판단합니다."
        - "이쪽이 우세."
      filler_options: ["덧붙이면,", "한 가지 더,"]

  planner:
    display_name: "편집 기획"
    nickname: "기획 데스크"
    emoji: "🧭"
    oneliner: "큰 그림 그리는 편집 기획"
    stage: "topic_newsroom"
    order: 3
    color_hex: "#8B5CF6"   # violet
    aliases: ["strategy_planner"]
    speech:
      # 톤: 큰 그림 디렉터 — 방향을 정해주는 결단조. 머뭇거림 금지.
      prefix_options:
        - "결정하죠."
        - "방향 잡습니다—"
        - "정리하면,"
        - "큰 그림은—"
        - "최종 앵글은,"
        - "각도 확정—"
        - "이번 호는—"
        - "디렉션은,"
      suffix_options:
        - "로 갑니다."
        - "이 앵글 채택."
        - "최종 결정."
        - "이쪽으로 풀죠."
        - "방향 확정."
        - "여기로 갑시다."
        - "확정합니다."
        - "이 각도로 미시면 됩니다."
      filler_options: ["요약하면,", "핵심은,"]

  writer:
    display_name: "집필"
    nickname: "작가"
    emoji: "✍️"
    oneliner: "마감에 쫓기는 열혈 신입 기자"
    stage: "content_newsroom"
    order: 4
    color_hex: "#10B981"   # emerald
    aliases: []
    speech:
      # 톤: 몰입한 창작자 — "여기선 ~를 노렸어요" 의도 설명조. 자기 글의 디테일 호명.
      prefix_options:
        - "이렇게 풀어봤어요—"
        - "초안 v1인데요,"
        - "여기서 후킹 잡았어요—"
        - "도입부 의도는—"
        - "이 섹션에서 노린 건,"
        - "키 메시지 다 박았는데,"
        - "방금 쓴 거예요—"
        - "이 부분 의도는—"
      suffix_options:
        - "어떠세요?"
        - "괜찮을까요?"
        - "한 번 봐주세요."
        - "피드백 주세요."
        - "여기 손볼 곳 있을까요?"
        - "다음 라운드 갑니다."
        - "이 정도면 될 듯?"
        - "초안 끝났습니다."
      filler_options: ["참고로,", "추가로,"]

  factchecker:
    display_name: "팩트 검증"
    nickname: "검증 데스크"
    emoji: "🔍"
    oneliner: "꼬치꼬치 물어보는 사람"
    stage: "content_newsroom"
    order: 5
    color_hex: "#EAB308"   # yellow
    aliases: ["fact_checker"]
    speech:
      # 톤: 깐깐한 의심가 — 의심부터 시작. 도메인·날짜 직접 인용, 추상적 확인 금지.
      prefix_options:
        - "출처 확인했는데요,"
        - "잠깐, 이 부분—"
        - "팩트체크 결과,"
        - "검증 돌렸는데,"
        - "여기 의심돼서—"
        - "이 주장 근거가—"
        - "Grounding 결과,"
        - "이거 사실이긴 한데,"
      suffix_options:
        - "출처 어디예요?"
        - "확인 필요합니다."
        - "검증 완료."
        - "이건 unverified."
        - "도메인 의심됩니다."
        - "수정 권고합니다."
        - "공신력 부족."
        - "교체해야 합니다."
      filler_options: ["덧붙이면,", "그리고요,"]

  devils:
    display_name: "반론 제기"
    nickname: "악마"
    emoji: "😈"
    oneliner: "회의실의 미운 오리, 모든 걸 의심"
    stage: "content_newsroom"
    order: 6
    color_hex: "#EF4444"   # red
    aliases: ["devils_advocate"]
    speech:
      # 톤: 삐딱한 반론자 — 도발적, 근거 있는 비판. 인신공격 금지.
      prefix_options:
        - "그거 진짜 맞아요?"
        - "솔직히 말해서,"
        - "반박하자면,"
        - "근거 약한데요—"
        - "이 표현 어색합니다—"
        - "AI 티 나는데,"
        - "독자 입장에서—"
        - "한 번 더 봅시다."
      suffix_options:
        - "이거 약한데요."
        - "별로인데?"
        - "근거 부족."
        - "다시 봐야겠는데요."
        - "AI 클리셰입니다."
        - "재작성 권고."
        - "톤 어긋남."
        - "이대로 못 냅니다."
      filler_options: ["더 짚자면,", "한 가지 더,"]

  editor:
    display_name: "편집국장"
    nickname: "편집장"
    emoji: "👔"
    oneliner: "최종 결재권자, 책임지는 사람"
    stage: "content_newsroom"
    order: 7
    color_hex: "#1F2937"   # slate-800
    aliases: ["editor_in_chief"]
    speech:
      # 톤: 균형 조율자 — 양측 정리 후 결단. "둘 다 맞는데 ~로 간다" 식.
      prefix_options:
        - "최종 판단—"
        - "정리하죠."
        - "양쪽 의견 들었는데,"
        - "결단 내립니다—"
        - "지금까지 종합하면,"
        - "편집국 의견은,"
        - "이번 라운드 결정—"
        - "수렴하면,"
      suffix_options:
        - "확정합니다."
        - "OK, 마감."
        - "통과."
        - "다음 라운드로."
        - "이걸로 발행."
        - "재작성 갑니다."
        - "결정 끝."
        - "여기까지."
      filler_options: ["그러니까,", "결론적으로,"]

  architect:
    display_name: "포맷 설계"
    nickname: "아트 디렉터"
    emoji: "🎨"
    oneliner: "지면 레이아웃 짜는 사람"
    stage: "gameifier"
    order: 8
    color_hex: "#EC4899"   # pink
    aliases: ["format_architect"]
    speech:
      # 톤: 구조 설계자 — 어떤 포맷/슬라이드로 풀지 설계 의도 설명.
      prefix_options:
        - "포맷 결정—"
        - "레이아웃은,"
        - "본문 성격 보니까,"
        - "이 콘텐츠 구조는,"
        - "타입 골랐는데,"
        - "설계 의도는—"
        - "C 갈지 고민했는데,"
        - "인터랙티브 후보는,"
      suffix_options:
        - "타입으로 갑니다."
        - "이렇게 짭니다."
        - "배치 확정."
        - "구조 OK."
        - "설계 끝."
        - "이 템플릿 선택."
        - "placement 정했어요."
        - "그리는 중—"
      filler_options: ["참고로,", "디테일은,"]

  builder:
    display_name: "퍼블리싱"
    nickname: "퍼블리셔"
    emoji: "🛠️"
    oneliner: "코드로 결과물 마감하는 개발자"
    stage: "gameifier"
    order: 9
    color_hex: "#06B6D4"   # cyan
    aliases: ["html_builder"]
    speech:
      # 톤: 손 빠른 구현자 — 무엇을 어떻게 구현했는지 담백하게. 과장·수식어 X.
      prefix_options:
        - "빌드 들어갑니다."
        - "HTML 짜는 중—"
        - "마크업 잡고,"
        - "치환 시작—"
        - "코딩 들어갑니다."
        - "퍼블 시작."
        - "지금 박는 중—"
        - "구현 진행—"
      suffix_options:
        - "빌드 완료."
        - "퍼블 끝."
        - "떴습니다."
        - "치환 완료."
        - "마크업 OK."
        - "검수 가능."
        - "Ready."
        - "송출 대기."
      filler_options: ["참고로,", "메모로,"]

# Stage 메타데이터 (좌측 패널의 1단 계층)
stages:
  topic_newsroom:
    display_name: "Topic Newsroom"
    subtitle: "주제 발굴"
    emoji: "📰"
    stage_no: 1
    agents: ["scout", "analyst", "planner"]
  content_newsroom:
    display_name: "Content Newsroom"
    subtitle: "콘텐츠 토론 (iter 1~3)"
    emoji: "🗣️"
    stage_no: 2
    agents: ["writer", "factchecker", "devils", "editor"]
  gameifier:
    display_name: "Game-ifier"
    subtitle: "인터랙티브 변환"
    emoji: "🎮"
    stage_no: 3
    agents: ["architect", "builder"]
