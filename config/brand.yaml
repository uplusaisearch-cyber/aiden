# =====================================================================
# 브랜드 / 톤앤매너 정의
# 다른 브랜드로 이관할 때는 이 파일만 교체하면 됩니다.
# =====================================================================

brand:
  name: "LG U+ 플러스탭"
  short_name: "플러스탭"
  # 색상은 실제 플러스탭 샘플 HTML 에서 추출한 값입니다.
  primary_color: "#ff2e98"      # Point (강조/CTA 핑크)
  secondary_color: "#181a1b"    # Body text (본문/검정 채움 버튼)
  accent_color: "#66707a"       # Sub text (보조 텍스트)
  sub_text_2: "#525960"         # Sub text 2 (더 진한 보조 텍스트)
  background_card: "#f9fafb"    # 카드형 콘텐츠 배경 (callout/quote)
  border_light: "#e7ebee"       # 가벼운 구분선 (quote 내부 등)

content_voice:
  tone: "친근하지만 가볍지 않은, 정중하고 명료한"
  ending_style: "~합니다 (기본), ~해 보세요 (권유)"
  paragraph_length: "3-5문장"

target_audience:
  description: "20-40대 LG U+ 가입자"
  characteristics:
    - "모바일 환경에서 2-3분 내 소비"
    - "실생활 도움 + 가벼운 재미 추구"
    - "가족 단위 의사결정자 비중 높음"
