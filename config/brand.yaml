brand:
  name: "LG U+ 플러스탭"
  short_name: "플러스탭"
  # 색상 값은 추정치 — 실제 가이드라인과 다를 수 있으니 추후 확정 시 수정
  primary_color: "#E6007E"      # LG U+ 핑크
  secondary_color: "#1A1A1A"    # 본문 텍스트
  accent_color: "#66707A"       # 보조 텍스트/구분선
  background_card: "#F9FAFB"    # 카드형 콘텐츠 배경

content_voice:
  tone: "친근하지만 가볍지 않은, 정중하고 명료한"
  ending_style: "~합니다 (기본), ~해 보세요 (권유)"
  paragraph_length: "3-5문장"

target_audience:
  description: "20-40대 LG U+ 가입자"
  characteristics:
    - "모바일 환경에서 2-3분 내 소비"
    - "실생활 도움 + 가벼운 재미 추구"
    - "가족 단위 의사결정자 비중 높음"
